name: Fetch Trends (KR / US / JP)

on:
  schedule:
    - cron: "0,30 * * * *"   # 매시 0분/30분 실행
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-trends
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # rebase 위해 필수

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run trend fetcher
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/run_all.mjs

      - name: Commit and push data
        run: |
          if git diff --quiet -- app/data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/*.json
          git commit -m "chore(data): update trends"
          git pull --rebase origin main     # 🔑 충돌 방지(필수)
          git push origin main
