<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trending Pulse Dashboard</title>
  <meta name="google-site-verification" content="5PGDok22gD5tOg6kbzfZIqHoPDnBBNthv_g5fRFxSlg" />
  <meta name="naver-site-verification" content="0cbff256be6a5d5b988ae4c6c34e3dd70a34bf4a" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <h1>Trending Pulse / 실시간 인기 검색어</h1>
      <p class="subtitle">
        Auto-updating Google & YouTube trends (US / KR / JP)
      </p>
    </div>
    <div class="controls">
      <a href="./report/" class="report-link">Trend Insights / 24~72시간 검색어 분석</a>
      <div class="control-group">
        <span class="label">Source</span>
        <div id="sourceButtons" class="chip-group"></div>
      </div>
      <div class="control-group toggle-group">
        <span class="label">뉴스 모드</span>
        <label class="toggle" for="newsModeToggle">
          <input type="checkbox" id="newsModeToggle" />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-hint">클릭하면 뉴스 탭</span>
      </div>
    </div>
  </header>

  <main class="layout" id="panels"></main>

  <footer class="footer">
    <span>Last updated: <span id="lastUpdated">--</span></span>
    <span class="muted">Auto-refreshes while open; data updates every ~30 minutes.</span>
  </footer>

  <script type="module" src="./main.js"></script>
  <!-- Cloudflare Pages: Build command = none, Output directory = app -->
</body>

</html>
